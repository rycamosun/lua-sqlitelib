on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: sync code
        run: |
          git remote add codeberg https://codeberg.org/ehatch/lua-sqlitelib.git
          git fetch codeberg --prune
          git push origin --mirror
