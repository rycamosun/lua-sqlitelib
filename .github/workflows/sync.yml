on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: sync code
        run: |
          git remote add codeberg https://codeberg.org/ehatch/lua-sqlitelib.git
          git fetch codeberg --prune
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/rycamosun/lua-sqlitelib.git
          git push origin --mirror
